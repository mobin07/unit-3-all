// Problem 1.1
    class Grandfather{
        constructor(n,a){
            this.name=n;
            this.age=a;
            this.surname='Memon'
        }
    }
    class Father extends Grandfather{
        constructor(n,a){
            super(n,a);
        }
    }
    class Son extends Father{
        constructor(n,a){
            super(n,a);
        }
    }
    //here we cannot extends son to grandfather as js do not allow this
    
    let c12=new Son('Mobin',24);
    console.log('c1:',c12);
    
    let c2=new Father('rauf',55);
    console.log('c2:',c2.age);
